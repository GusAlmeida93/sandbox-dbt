# ============================================================================
# Properties for the staging layer: descriptions (docs) + data tests.
# NOTE: dbt 1.8 renamed the `tests:` key to `data_tests:` (to distinguish from
# unit tests). The old spelling still works but sprays deprecation warnings.
# See docs/07.
# ============================================================================
version: 2

models:
  - name: stg_customers
    description: >
      One row per customer. Names/emails normalized; addresses are the
      CURRENT ones (the source mutates them in place -- history is captured
      by snap_customers).
    columns:
      - name: customer_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: email
        description: Lowercased email; unique by construction in the source.
        data_tests:
          - unique
      - name: country_code
        description: ISO-3166 alpha-2, uppercased.
        data_tests:
          - not_null
          # cross-layer referential check into a SEED -- tests work across
          # any ref()-able resource. Test kwargs go under `arguments:`
          # (dbt 1.10+; the un-nested spelling is deprecated).
          - relationships:
              arguments:
                to: ref('country_codes')
                field: country_code

  - name: stg_orders
    description: One row per order, with its CURRENT status (source mutates in place).
    columns:
      - name: order_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: FK to stg_customers.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: status
        description: >
          Order lifecycle state. placed -> shipped -> completed, with
          returned/cancelled exits.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'cancelled']
              # store_failures materializes failing rows into a table under
              # <schema>_dbt_test__audit so you can inspect WHICH rows broke.
              # Notebook 04 abuses this on purpose.
              config:
                store_failures: true

  - name: stg_products
    description: The product catalog with prices converted to dollars.
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: price
        description: Unit price in dollars (converted from integer cents).
        data_tests:
          # custom generic test defined in tests/generic/positive_value.sql
          - positive_value

  - name: stg_order_items
    description: One row per product within an order.
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: quantity
        data_tests:
          - positive_value

  - name: stg_payments
    description: One payment per order, in dollars.
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: payment_method
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('payment_methods')
                field: payment_method
      - name: amount
        data_tests:
          - positive_value

  - name: stg_events
    description: >
      Website clickstream. customer_id is null for logged-out visitors, so
      it deliberately has NO not_null test -- tests should encode real
      invariants, not wishful thinking.
    columns:
      - name: event_id
        data_tests:
          - unique
          - not_null
      - name: event_type
        data_tests:
          # severity demo: a new event type appearing upstream should nag,
          # not break the nightly build
          - accepted_values:
              arguments:
                values: ['page_view', 'search', 'add_to_cart', 'checkout']
              config:
                severity: warn
