# ============================================================================
# Marts properties. Highlights:
#   * dim_customers has an ENFORCED CONTRACT: dbt refuses to build it if the
#     SQL stops matching the declared columns/types (docs/18), and ships the
#     not_null constraint into the actual DDL.
#   * persist_docs copies descriptions into Postgres COMMENT ON statements.
#   * {{ doc('...') }} pulls long-form descriptions from _marts__docs.md.
# ============================================================================
version: 2

models:
  - name: dim_customers
    description: '{{ doc("dim_customers") }}'
    config:
      contract:
        enforced: true
      persist_docs:
        relation: true
        columns: true
    columns:
      - name: customer_id
        description: Primary key.
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_type: text
      - name: last_name
        data_type: text
      - name: email
        data_type: text
      - name: city
        description: Current city (see snap_customers for history).
        data_type: text
      - name: country_code
        data_type: text
      - name: country_name
        description: Joined from the country_codes seed.
        data_type: text
      - name: region
        data_type: text
      - name: customer_since
        description: Account creation time.
        data_type: timestamp
      - name: first_order_at
        description: Null for customers who never ordered.
        data_type: timestamp
      - name: most_recent_order_at
        data_type: timestamp
      - name: number_of_orders
        description: Lifetime non-cancelled orders.
        data_type: bigint
      - name: lifetime_value
        description: '{{ doc("lifetime_value") }}'
        data_type: numeric
      - name: ltv_quartile
        description: 1 = top 25% of spenders, 4 = bottom.
        data_type: integer
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
                quote: false

  - name: dim_products
    description: Product catalog with price tiers.
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: price_tier
        data_tests:
          - accepted_values:
              arguments:
                values: ['premium', 'standard', 'budget']

  - name: fct_orders
    description: '{{ doc("fct_orders") }}'
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'cancelled']
      - name: order_revenue
        data_tests:
          # generic test from a PACKAGE, configured inline
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: amount_paid
        data_tests:
          # assertion-style test from dbt_expectations
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000

  - name: fct_order_items
    description: One row per product per order (finest grain).
    columns:
      - name: order_item_key
        description: Surrogate key over (order_id, product_id).
        data_tests:
          - unique
          - not_null

  - name: fct_events
    description: >
      Clickstream fact, built with the microbatch strategy -- one independent
      batch per day since var('training_start_date').
    columns:
      - name: event_id
        data_tests:
          - unique
          - not_null

  - name: agg_daily_revenue
    description: Daily revenue rollup as a Postgres MATERIALIZED VIEW.
    columns:
      - name: order_date
        data_tests:
          - unique
          - not_null
