version: 2

models:
  - name: int_order_items_enriched
    description: >
      Order items joined to their order and product (ephemeral -- inlined
      into whatever references it, never built in the warehouse).

  - name: int_order_payments
    description: >
      One row per order with payment totals pivoted by method. The pivot
      columns are generated by Jinja from the payment_methods seed.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

# ----------------------------------------------------------------------------
# UNIT test (dbt 1.8+): tests the SQL LOGIC with mocked inputs, before the
# model is built -- like a software unit test, vs. data tests which check the
# real data after building. See docs/07.
# ----------------------------------------------------------------------------
unit_tests:
  - name: unit_int_order_payments_pivot
    description: >
      Given two payments on one order with different methods, the pivot must
      put each amount in its method column and sum the total.
    model: int_order_payments
    given:
      - input: ref('stg_payments')
        rows:
          - {order_id: 1, payment_method: credit_card, amount: 30.00}
          - {order_id: 1, payment_method: pix, amount: 20.00}
      - input: ref('payment_methods')
        rows:
          - {payment_method: credit_card}
    # Unit tests mock inputs as inline CTEs, and introspective macros like
    # get_column_values cannot query a CTE -- so we override the MACRO too.
    # This also makes the test hermetic: its columns no longer depend on
    # whatever is in the seed file.
    overrides:
      macros:
        dbt_utils.get_column_values:
          ['bank_transfer', 'credit_card', 'debit_card', 'gift_card', 'pix']
    # Gotcha: expected values are compared by their rendered text. YAML parses
    # 50.00 as the float 50.0, which then mismatches numeric(16,2)'s "50.00" --
    # quote decimal expectations as strings to keep their trailing zeros.
    expect:
      rows:
        - order_id: 1
          total_amount: "50.00"
          bank_transfer_amount: 0
          credit_card_amount: "30.00"
          debit_card_amount: 0
          gift_card_amount: 0
          pix_amount: "20.00"
